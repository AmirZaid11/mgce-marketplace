<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE | MGCE MARKET PLACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Firebase Global Elite -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; overflow-x: hidden; }
        [x-cloak] { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(40px); border: 1px solid rgba(212, 175, 55, 0.1); }
        .logo-glow { filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4)); }
        
        /* Midnight Nebula Mesh Gradient */
        .nebula-bg {
            background: radial-gradient(circle at 0% 0%, #0f172a 0%, #020617 100%);
            position: fixed;
            inset: 0;
            z-index: -1;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: float 15s infinite alternate ease-in-out;
            z-index: -1;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(100px, 100px) scale(1.2); }
        }

        .floating { animation: floating 3s infinite ease-in-out; }
        @keyframes floating {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        /* Sassy Border Glow */
        .card-glow {
            box-shadow: 0 0 50px -12px rgba(212, 175, 55, 0.15);
        }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#d4af37', // Gold
                        navy: '#0f172a',
                        'navy-dark': '#020617',
                        accent: '#e21d48'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-navy-dark min-h-screen flex flex-col selection:bg-primary/30" x-data="authHandler()" x-init="init()" x-cloak>

    <!-- Nebula Background Orbs -->
    <div class="nebula-bg"></div>
    <div class="orb w-96 h-96 bg-primary top-[-10%] left-[-10%]"></div>
    <div class="orb w-[500px] h-[500px] bg-accent bottom-[-10%] right-[-10%] transition-delay-2000" style="animation-delay: 2s;"></div>

    <!-- Header / Logo -->
    <header class="p-8 flex justify-center relative z-10 floating">
        <a href="/" class="flex flex-col items-center group">
            <div class="relative">
                <div class="absolute inset-0 bg-primary/20 blur-2xl rounded-full scale-150 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <img src="assets/images/mgce.jpeg" alt="Logo" class="h-20 w-auto logo-glow mb-4 rounded-3xl relative">
            </div>
            <h1 class="text-3xl font-black text-white uppercase tracking-tighter">ELITE | <span class="text-primary italic">MARKET PLACE</span></h1>
            <p class="text-[10px] font-black text-primary/40 uppercase tracking-[0.4em] mt-1 ml-1 opacity-60">Authentication Gateway</p>
        </a>
    </header>

    <!-- Auth Card Container -->
    <main class="flex-1 container mx-auto px-4 py-8 flex items-center justify-center relative z-10">
        <div class="w-full max-w-md space-y-8 animate-fade-in">
            
            <!-- The Elite Card -->
            <div class="glass card-glow rounded-[40px] p-10 relative overflow-hidden group shadow-navy/40">
                <!-- Internal Decorative Light -->
                <div class="absolute top-0 right-0 w-48 h-48 bg-primary/5 rounded-full -mr-24 -mt-24 blur-3xl group-hover:bg-primary/10 transition-colors"></div>
                
                <!-- Tab Switching -->
                <div class="flex p-1.5 bg-white/5 rounded-[24px] mb-10 relative z-10 border border-white/5">
                    <button @click="mode = 'login'" 
                            class="flex-1 py-3.5 rounded-[20px] text-xs font-black uppercase tracking-[0.2em] transition-all duration-500"
                            :class="mode === 'login' ? 'bg-primary text-navy shadow-[0_0_20px_rgba(212,175,55,0.3)]' : 'text-slate-400 hover:text-white'">
                        Log In
                    </button>
                    <button @click="mode = 'signup'" 
                            class="flex-1 py-3.5 rounded-[20px] text-xs font-black uppercase tracking-[0.2em] transition-all duration-500"
                            :class="mode === 'signup' ? 'bg-primary text-navy shadow-[0_0_20px_rgba(212,175,55,0.3)]' : 'text-slate-400 hover:text-white'">
                        Join Us
                    </button>
                </div>

                <!-- Registration Role Toggle -->
                <div x-show="mode === 'signup'" class="flex gap-4 mb-8" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translateY(10px)">
                    <button @click="role = 'buyer'" 
                            class="flex-1 p-6 rounded-[28px] border-2 transition-all duration-300 text-center flex flex-col items-center gap-3 group/role"
                            :class="role === 'buyer' ? 'border-primary bg-primary/10 shadow-[0_0_15px_rgba(212,175,55,0.2)]' : 'border-white/5 bg-white/5'">
                        <span class="text-3xl group-hover/role:scale-110 transition-transform">🛍️</span>
                        <span class="text-[10px] font-black uppercase tracking-[0.2em]" :class="role === 'buyer' ? 'text-primary' : 'text-slate-500'">Buyer</span>
                    </button>
                    <button @click="role = 'seller'" 
                            class="flex-1 p-6 rounded-[28px] border-2 transition-all duration-300 text-center flex flex-col items-center gap-3 group/role"
                            :class="role === 'seller' ? 'border-primary bg-primary/10 shadow-[0_0_15px_rgba(212,175,55,0.2)]' : 'border-white/5 bg-white/5'">
                        <span class="text-3xl group-hover/role:scale-110 transition-transform">🏬</span>
                        <span class="text-[10px] font-black uppercase tracking-[0.2em]" :class="role === 'seller' ? 'text-primary' : 'text-slate-500'">Seller</span>
                    </button>
                </div>
 
                <!-- Forms -->
                <form @submit.prevent="handleSubmit" class="space-y-6 relative z-10">
                    <!-- Signup Fields -->
                    <div x-show="mode === 'signup'" class="space-y-5">
                        <div class="space-y-2">
                            <label class="text-[10px] font-black text-primary/60 uppercase tracking-[0.3em] ml-5">Display Name</label>
                            <div class="relative">
                                <i data-lucide="user" class="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-primary/40"></i>
                                <input type="text" x-model="form.name" placeholder="E.g. John Doe" 
                                       class="w-full pl-14 pr-6 py-5 bg-white/5 border border-white/10 rounded-[24px] focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-white placeholder-slate-600">
                            </div>
                        </div>
 
                        <div x-show="role === 'seller'" class="space-y-2" x-transition>
                            <label class="text-[10px] font-black text-primary/60 uppercase tracking-[0.3em] ml-5">Brand / Business Name</label>
                            <div class="relative">
                                <i data-lucide="briefcase" class="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-primary/40"></i>
                                <input type="text" x-model="form.brandName" placeholder="E.g. Maseno Kicks" 
                                       class="w-full pl-14 pr-6 py-5 bg-white/5 border border-white/10 rounded-[24px] focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-white placeholder-slate-600">
                            </div>
                        </div>
                    </div>
 
                    <!-- Phone (Always required) -->
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-primary/60 uppercase tracking-[0.3em] ml-5">Phone Number</label>
                        <div class="relative">
                            <i data-lucide="phone" class="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-primary/40"></i>
                            <input type="tel" x-model="form.phone" placeholder="07xx or 01xx..." 
                                   class="w-full pl-14 pr-6 py-5 bg-white/5 border border-white/10 rounded-[24px] focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all text-white placeholder-slate-600">
                        </div>
                    </div>
 
                    <button type="submit" 
                            class="w-full py-6 bg-gradient-to-r from-primary to-[#b8860b] text-navy rounded-[24px] font-black uppercase tracking-[0.3em] text-[10px] shadow-[0_10px_30px_rgba(212,175,55,0.4)] hover:shadow-primary/60 hover:scale-[1.03] active:scale-95 transition-all duration-300 flex items-center justify-center gap-4">
                        <span x-text="mode === 'login' ? 'Enter Portal' : 'Secure Membership'"></span>
                        <i data-lucide="shield-check" class="w-5 h-5"></i>
                    </button>
                </form>
 
                <p class="mt-10 text-center text-[9px] text-primary/40 font-black uppercase tracking-[0.4em] leading-loose max-w-[280px] mx-auto">
                    Empowering the resilient spirit of the MGCE Girls Society.
                </p>
            </div>
        </div>
    </main>

    <!-- Success Modal -->
    <template x-if="showSuccess">
        <div class="fixed inset-0 z-200 flex items-center justify-center p-4 bg-navy/60 backdrop-blur-md">
            <div class="bg-white dark:bg-slate-900 rounded-[32px] p-10 max-w-sm w-full text-center space-y-6 shadow-2xl border border-primary/20 animate-fade-in-up">
                <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mx-auto">
                    <i data-lucide="check-circle" class="w-10 h-10 text-primary"></i>
                </div>
                <h2 class="text-2xl font-black text-navy dark:text-white uppercase tracking-tighter">Welcome to Elite!</h2>
                <div class="space-y-4 text-slate-500 dark:text-slate-400 text-sm leading-relaxed">
                    <p>Your account is ready.</p>
                    <p x-show="isNewBuyer" class="p-4 bg-primary/5 rounded-2xl border border-primary/20 text-navy dark:text-slate-300">
                        ✨ Your phone number will be verified soon. A <span class="text-primary font-bold">star</span> will be added to your name once verified!
                    </p>
                </div>
                <button @click="proceed" class="w-full py-4 bg-navy dark:bg-primary text-primary dark:text-navy rounded-2xl font-black uppercase tracking-widest text-xs">
                    Get Started
                </button>
            </div>
        </div>
    </template>

    <script src="assets/js/storage.js"></script>
    <script>
        function authHandler() {
            return {
                mode: 'login', // login or signup
                role: 'buyer', // buyer or seller
                showSuccess: false,
                isNewBuyer: false,
                form: {
                    name: '',
                    phone: '',
                    brandName: ''
                },

                init() {
                    const params = new URLSearchParams(window.location.search);
                    if (params.get('mode')) this.mode = params.get('mode');
                    if (params.get('role')) this.role = params.get('role');
                    lucide.createIcons();
                },

                async handleSubmit() {
                    // 1. Validate Phone
                    const phoneRegex = /^(07|01)\d{8}$/;
                    if (!phoneRegex.test(this.form.phone)) {
                        alert("Invalid Phone: Must start with 07 or 01 and be 10 digits.");
                        return;
                    }

                    try {
                        await MarketplaceDB.init();

                        if (this.mode === 'signup') {
                            if (!this.form.name) return alert("Please enter your name.");
                            
                            // Check if user exists (Local + Cloud)
                            const existing = await MarketplaceDB.getUser(this.form.phone);
                            if (existing) return alert("Phone already registered. Please log in.");

                            const newUser = {
                                phone: this.form.phone,
                                name: this.form.name,
                                role: this.role,
                                brandName: this.role === 'seller' ? this.form.brandName : '',
                                isVerified: false,
                                favorites: []
                            };
                            
                            await MarketplaceDB.saveUser(newUser);
                            this.isNewBuyer = this.role === 'buyer';
                            this.showSuccess = true;
                        } else {
                            // Login (Auto-checks Cloud if local missing)
                            const user = await MarketplaceDB.getUser(this.form.phone);
                            if (!user) return alert("User not found. Please Join Us first.");
                            
                            await MarketplaceDB.setCurrentSession(user.phone);
                            this.redirect(user.role);
                        }
                    } catch (err) {
                        alert(err.message);
                    }
                },

                proceed() {
                    this.showSuccess = false;
                    // For signup, we take them to sign in screen or just log in directly?
                    // User said: "upon click register, a personalised message for welcome is displayed and user taken to sign in"
                    this.mode = 'login';
                    // Re-run icons for new state
                    setTimeout(() => lucide.createIcons(), 50);
                },

                redirect(role) {
                    if (role === 'seller') {
                        window.location.href = '/account';
                    } else {
                        window.location.href = '/shop';
                    }
                }
            }
        }
    </script>
</body>
</html>
