<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MGCE MARKET PLACE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        [x-cloak] { display: none !important; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); }
        .dark .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); }
        .logo-glow { filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3)); }
    </style>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#d4af37', // Gold
                        navy: '#0f172a',
                        'navy-dark': '#020617',
                        cream: '#fdfbf7',
                        accent: '#e21d48'
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-cream dark:bg-navy min-h-screen flex flex-col selection:bg-primary/30" x-data="authHandler()" x-cloak>

    <!-- Header / Logo -->
    <header class="p-8 flex justify-center">
        <a href="/" class="flex flex-col items-center">
            <img src="assets/images/mgce.jpeg" alt="Logo" class="h-16 w-auto logo-glow mb-4 rounded-2xl">
            <h1 class="text-3xl font-black text-navy dark:text-white uppercase tracking-tighter">MGCE <span class="text-primary italic">MARKET PLACE</span></h1>
        </a>
    </header>

    <main class="flex-1 container mx-auto px-4 py-8 flex items-center justify-center">
        <div class="w-full max-w-md space-y-8">
            
            <!-- Auth Card -->
            <div class="glass border border-border dark:border-slate-800 rounded-[32px] p-8 shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 rounded-full -mr-16 -mt-16 blur-3xl"></div>
                
                <!-- Tab Switching -->
                <div class="flex p-1 bg-slate-100 dark:bg-slate-900/50 rounded-2xl mb-8 relative z-10">
                    <button @click="mode = 'login'" 
                            class="flex-1 py-2.5 rounded-xl text-sm font-black uppercase tracking-widest transition-all"
                            :class="mode === 'login' ? 'bg-white dark:bg-slate-800 text-navy dark:text-white shadow-lg' : 'text-slate-400 hover:text-slate-600'">
                        Log In
                    </button>
                    <button @click="mode = 'signup'" 
                            class="flex-1 py-2.5 rounded-xl text-sm font-black uppercase tracking-widest transition-all"
                            :class="mode === 'signup' ? 'bg-white dark:bg-slate-800 text-navy dark:text-white shadow-lg' : 'text-slate-400 hover:text-slate-600'">
                        Join Us
                    </button>
                </div>

                <!-- Registration Role Toggle -->
                <div x-show="mode === 'signup'" class="flex gap-4 mb-8" x-transition>
                    <button @click="role = 'buyer'" 
                            class="flex-1 p-4 rounded-2xl border-2 transition-all text-center flex flex-col items-center gap-2"
                            :class="role === 'buyer' ? 'border-primary bg-primary/5' : 'border-transparent bg-slate-50 dark:bg-slate-900/40'">
                        <span class="text-2xl">🛍️</span>
                        <span class="text-[10px] font-black uppercase tracking-widest" :class="role === 'buyer' ? 'text-primary' : 'text-slate-400'">Buyer</span>
                    </button>
                    <button @click="role = 'seller'" 
                            class="flex-1 p-4 rounded-2xl border-2 transition-all text-center flex flex-col items-center gap-2"
                            :class="role === 'seller' ? 'border-primary bg-primary/5' : 'border-transparent bg-slate-50 dark:bg-slate-900/40'">
                        <span class="text-2xl">🏬</span>
                        <span class="text-[10px] font-black uppercase tracking-widest" :class="role === 'seller' ? 'text-primary' : 'text-slate-400'">Seller</span>
                    </button>
                </div>

                <!-- Forms -->
                <form @submit.prevent="handleSubmit" class="space-y-6 relative z-10">
                    <!-- Signup Fields -->
                    <div x-show="mode === 'signup'" class="space-y-4">
                        <div class="space-y-1">
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Display Name</label>
                            <div class="relative">
                                <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                                <input type="text" x-model="form.name" placeholder="E.g. John Doe" 
                                       class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-900/40 border border-border dark:border-slate-800 rounded-2xl focus:ring-2 focus:ring-primary outline-none transition-all dark:text-white">
                            </div>
                        </div>

                        <div x-show="role === 'seller'" class="space-y-1" x-transition>
                            <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Brand / Business Name</label>
                            <div class="relative">
                                <i data-lucide="briefcase" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                                <input type="text" x-model="form.brandName" placeholder="E.g. Maseno Kicks" 
                                       class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-900/40 border border-border dark:border-slate-800 rounded-2xl focus:ring-2 focus:ring-primary outline-none transition-all dark:text-white">
                            </div>
                        </div>
                    </div>

                    <!-- Phone (Always required) -->
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest ml-4">Phone Number</label>
                        <div class="relative">
                            <i data-lucide="phone" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                            <input type="tel" x-model="form.phone" placeholder="07xx or 01xx..." 
                                   class="w-full pl-12 pr-4 py-4 bg-slate-50 dark:bg-slate-900/40 border border-border dark:border-slate-800 rounded-2xl focus:ring-2 focus:ring-primary outline-none transition-all dark:text-white">
                        </div>
                    </div>

                    <button type="submit" 
                            class="w-full py-5 bg-navy dark:bg-primary text-primary dark:text-navy rounded-2xl font-black uppercase tracking-widest text-sm shadow-2xl hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
                        <span x-text="mode === 'login' ? 'Sign In' : 'Join MGCE'"></span>
                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                    </button>
                </form>

                <p class="mt-8 text-center text-xs text-slate-400 font-medium uppercase tracking-[0.1em]">
                    Empowering the resilient spirit and commerce of the MGCE Girls Society.
                </p>
            </div>
        </div>
    </main>

    <!-- Success Modal -->
    <template x-if="showSuccess">
        <div class="fixed inset-0 z-200 flex items-center justify-center p-4 bg-navy/60 backdrop-blur-md">
            <div class="bg-white dark:bg-slate-900 rounded-[32px] p-10 max-w-sm w-full text-center space-y-6 shadow-2xl border border-primary/20 animate-fade-in-up">
                <div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center mx-auto">
                    <i data-lucide="check-circle" class="w-10 h-10 text-primary"></i>
                </div>
                <h2 class="text-2xl font-black text-navy dark:text-white uppercase tracking-tighter">Welcome to Elite!</h2>
                <div class="space-y-4 text-slate-500 dark:text-slate-400 text-sm leading-relaxed">
                    <p>Your account is ready.</p>
                    <p x-show="isNewBuyer" class="p-4 bg-primary/5 rounded-2xl border border-primary/20 text-navy dark:text-slate-300">
                        ✨ Your phone number will be verified soon. A <span class="text-primary font-bold">star</span> will be added to your name once verified!
                    </p>
                </div>
                <button @click="proceed" class="w-full py-4 bg-navy dark:bg-primary text-primary dark:text-navy rounded-2xl font-black uppercase tracking-widest text-xs">
                    Get Started
                </button>
            </div>
        </div>
    </template>

    <script src="assets/js/storage.js"></script>
    <script>
        function authHandler() {
            return {
                mode: 'login', // login or signup
                role: 'buyer', // buyer or seller
                showSuccess: false,
                isNewBuyer: false,
                form: {
                    name: '',
                    phone: '',
                    brandName: ''
                },

                init() {
                    const params = new URLSearchParams(window.location.search);
                    if (params.get('mode')) this.mode = params.get('mode');
                    if (params.get('role')) this.role = params.get('role');
                    lucide.createIcons();
                },

                async handleSubmit() {
                    // 1. Validate Phone
                    const phoneRegex = /^(07|01)\d{8}$/;
                    if (!phoneRegex.test(this.form.phone)) {
                        alert("Invalid Phone: Must start with 07 or 01 and be 10 digits.");
                        return;
                    }

                    try {
                        await MarketplaceDB.init();

                        if (this.mode === 'signup') {
                            if (!this.form.name) return alert("Please enter your name.");
                            
                            // Check if user exists
                            const existing = await MarketplaceDB.getUser(this.form.phone);
                            if (existing) return alert("Phone already registered. Please log in.");

                            const newUser = {
                                phone: this.form.phone,
                                name: this.form.name,
                                role: this.role,
                                brandName: this.role === 'seller' ? this.form.brandName : '',
                                isVerified: false,
                                favorites: []
                            };
                            
                            await MarketplaceDB.saveUser(newUser);
                            this.isNewBuyer = this.role === 'buyer';
                            this.showSuccess = true;
                            // Pre-set mode to login for proceed or auto-login
                        } else {
                            // Login
                            const user = await MarketplaceDB.getUser(this.form.phone);
                            if (!user) return alert("User not found. Please Join Us first.");
                            
                            await MarketplaceDB.setCurrentSession(user.phone);
                            this.redirect(user.role);
                        }
                    } catch (err) {
                        alert(err.message);
                    }
                },

                proceed() {
                    this.showSuccess = false;
                    // For signup, we take them to sign in screen or just log in directly?
                    // User said: "upon click register, a personalised message for welcome is displayed and user taken to sign in"
                    this.mode = 'login';
                    // Re-run icons for new state
                    setTimeout(() => lucide.createIcons(), 50);
                },

                redirect(role) {
                    if (role === 'seller') {
                        window.location.href = '/account';
                    } else {
                        window.location.href = '/shop';
                    }
                }
            }
        }
    </script>
</body>
</html>
