<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Shop | Maseno Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#d4af37', // Gold
                        accent: '#6b21a8',  // Purple from Logo
                        navy: '#0f172a',
                        'navy-dark': '#020617',
                        cream: '#fdfcf7',
                        border: '#e2e8f0',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Firebase Global Elite -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-white dark:bg-navy text-navy selection:bg-primary/30" 
      x-data="{ mobileMenu: false, filter: 'all', user: null }"
      x-init="
        await window.MarketplaceDB.init();
        user = await window.MarketplaceDB.getCurrentSession();
      ">

    <!-- Luxe Navbar -->
    <div class="fixed top-6 inset-x-0 z-50 px-4 md:px-8 pointer-events-none">
        <header class="container mx-auto max-w-6xl nav-capsule flex items-center justify-between gap-4 pointer-events-auto animate-luxe-up">
            <a href="/" class="flex items-center gap-3 pl-4 group">
                <img src="assets/images/mgce.jpeg" alt="Logo" class="h-10 w-10 min-w-[40px] rounded-2xl shadow-lg shadow-black/20 group-hover:scale-110 transition-transform">
                <div class="hidden sm:flex flex-col border-l border-white/10 pl-3">
                    <span class="text-white font-black uppercase tracking-tighter text-lg leading-tight">MGCE</span>
                    <span class="text-[8px] text-primary font-black uppercase tracking-[0.3em]">Elite Market</span>
                </div>
            </a>
            
            <nav class="flex items-center gap-1 md:gap-2 pr-2">
                <div class="hidden md:flex items-center gap-1 mr-2 bg-white/5 p-1 rounded-2xl">
                    <a href="shop.html" class="px-5 py-2.5 text-[10px] font-black uppercase tracking-widest text-primary">Shop</a>
                    <template x-if="user && user.role === 'seller'">
                        <a href="sell.html" class="px-5 py-2.5 text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-white transition-colors">Post</a>
                    </template>
                </div>

                <!-- Icons Group -->
                <div class="flex items-center gap-1">
                    <a href="shop.html?filter=favorites" class="p-3 text-red-500 hover:bg-white/5 rounded-2xl transition-all" title="My Favorites">
                        <i data-lucide="heart" class="w-5 h-5"></i>
                    </a>
                    <button onclick="toggleTheme()" class="p-3 text-primary hover:bg-white/5 rounded-2xl transition-all group" title="Switch Theme">
                        <i data-lucide="sun-moon" class="w-5 h-5 group-hover:rotate-12 transition-transform"></i>
                    </button>
                    <a href="account.html" class="p-3 text-slate-400 hover:text-white hover:bg-white/5 rounded-2xl transition-all">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </a>
                    <button x-show="user" @click="window.handleLogout()" class="p-3 text-red-400 hover:bg-red-500/10 rounded-2xl transition-all">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                    <button @click="mobileMenu = !mobileMenu" class="md:hidden p-3 text-white">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                </div>
            </nav>
        </header>
    </div>

    <!-- Mobile Menu Overlay (Moved to Body Root for compatibility) -->
    <div x-show="mobileMenu" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 -translate-x-full"
         x-transition:enter-end="opacity-100 translate-x-0"
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="opacity-100 translate-x-0"
         x-transition:leave-end="opacity-0 -translate-x-full"
         class="fixed inset-0 z-100 md:hidden" x-cloak>
        
        <div class="absolute inset-0 bg-navy/80 backdrop-blur-md" @click="mobileMenu = false"></div>
        
        <nav class="relative w-[280px] h-full bg-white dark:bg-slate-900 shadow-2xl flex flex-col overflow-y-auto border-r border-primary/20 text-navy dark:text-white">
            <!-- Menu Header -->
            <div class="p-6 border-b border-border dark:border-slate-800 flex items-center justify-between bg-white dark:bg-slate-900 sticky top-0 z-10">
                <div class="flex flex-col">
                    <span class="font-black uppercase tracking-tighter text-xl leading-none">MGCE</span>
                    <span class="text-[9px] text-primary font-black uppercase tracking-[0.2em]">Navigation</span>
                </div>
                <button @click="mobileMenu = false" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-xl text-slate-500">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="p-6 flex-1 flex flex-col bg-white dark:bg-slate-900">
                <!-- Mobile Search -->
                <form onsubmit="window.handleNavbarSearch(event)" class="mb-8 relative">
                    <input type="text" placeholder="Search Maseno..." oninput="window.handleLiveSearch(event)"
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-border dark:border-slate-800 rounded-2xl outline-none focus:ring-2 focus:ring-primary dark:text-white text-sm">
                    <i data-lucide="search" class="absolute left-3 top-3.5 w-4 h-4 text-slate-400"></i>
                </form>

                <div class="space-y-2 flex-1">
                    <a href="/" class="flex items-center gap-4 py-4 px-5 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800/50 font-bold uppercase tracking-widest text-xs transition-all">
                        <i data-lucide="home" class="w-4 h-4"></i> Home
                    </a>
                    <a href="/shop" class="flex items-center gap-4 py-4 px-5 rounded-2xl bg-primary/10 text-primary font-black uppercase tracking-widest text-xs transition-all border border-primary/20">
                        <i data-lucide="shopping-bag" class="w-4 h-4"></i> Shop All
                    </a>
                    <template x-if="user && user.role === 'seller'">
                        <a href="/sell" class="flex items-center gap-4 py-4 px-5 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800/50 font-bold uppercase tracking-widest text-xs transition-all">
                            <i data-lucide="plus-circle" class="w-4 h-4"></i> Post Item
                        </a>
                    </template>
                    <a href="/account" class="flex items-center gap-4 py-4 px-5 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800/50 font-bold uppercase tracking-widest text-xs transition-all">
                        <i data-lucide="user" class="w-4 h-4"></i> My Account
                    </a>
                    <template x-if="user">
                        <button @click="window.handleLogout()" class="w-full flex items-center gap-4 py-4 px-5 rounded-2xl bg-red-500/10 text-red-500 font-black uppercase tracking-widest text-xs transition-all border border-red-500/20 mt-4">
                            <i data-lucide="log-out" class="w-4 h-4"></i> Log Out
                        </button>
                    </template>
                </div>

                <div class="mt-auto pt-8 border-t border-border dark:border-slate-800">
                    <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest text-center">Empowering Maseno Community</p>
                </div>
            </div>
        </nav>
    </div>

    <main class="pt-32 pb-20 px-4 md:px-8">
        <div class="container mx-auto flex flex-col lg:flex-row gap-8 items-start">
            
            <!-- Luxe Sidebar (Filters) -->
            <aside class="w-full lg:w-[320px] shrink-0 sticky top-32 luxe-card p-10 space-y-12 animate-luxe-up">
                <div class="space-y-4">
                    <h3 class="text-[10px] font-black text-primary uppercase tracking-[0.3em]">Refine Search</h3>
                    <div class="relative group">
                        <input type="text" placeholder="Search items..." 
                               oninput="window.handleLiveSearch(event)"
                               class="w-full pl-12 pr-6 py-4 bg-slate-50 dark:bg-slate-800 border-none rounded-2xl outline-none focus:ring-2 focus:ring-primary transition-all text-navy dark:text-white text-xs font-bold">
                        <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    </div>
                </div>

                <div class="space-y-6">
                    <h3 class="text-[10px] font-black text-secondary uppercase tracking-[0.3em]">Market Role</h3>
                    <div class="flex flex-col gap-3">
                        <button @click="window.location.href='shop.html'" 
                                :class="!window.location.search ? 'bg-navy text-white shadow-xl translate-x-2' : 'text-slate-400 bg-slate-50 dark:bg-slate-800'"
                                class="flex items-center gap-4 py-4 px-6 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all text-left">
                            <i data-lucide="layout-grid" class="w-4 h-4"></i> All Products
                        </button>
                        <button @click="window.location.href='shop.html?type=service'" 
                                :class="window.location.search.includes('type=service') ? 'bg-navy text-white shadow-xl translate-x-2' : 'text-slate-400 bg-slate-50 dark:bg-slate-800'"
                                class="flex items-center gap-4 py-4 px-6 rounded-2xl font-black text-[10px] uppercase tracking-widest transition-all text-left">
                            <i data-lucide="sparkles" class="w-4 h-4"></i> Campus Services
                        </button>
                    </div>
                </div>

                <!-- Verified Only Toggle (Luxe Style) -->
                <div class="pt-8 border-t border-slate-50 dark:border-white/5 space-y-4">
                    <div class="flex items-center justify-between">
                        <div class="flex flex-col">
                            <span class="text-[10px] font-black text-navy dark:text-white uppercase tracking-tighter">Elite Filter</span>
                            <span class="text-[8px] text-slate-400 uppercase font-bold tracking-widest">Verified Sellers Only</span>
                        </div>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" class="sr-only peer">
                            <div class="w-11 h-6 bg-slate-200 dark:bg-slate-800 rounded-full peer-checked:bg-primary after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
                        </label>
                    </div>
                </div>
            </aside>

            <!-- Main Shop Canvas -->
            <div class="flex-1 luxe-card p-10 space-y-10 min-h-[800px] animate-luxe-up" style="animation-delay: 0.1s">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 border-b border-slate-50 dark:border-white/5 pb-8">
                    <div>
                        <h1 class="text-3xl font-black text-navy dark:text-white uppercase tracking-tighter" id="category-title">Market Feed</h1>
                        <p class="text-[10px] text-slate-400 uppercase tracking-widest font-black mt-1">Curated Maseno Selection</p>
                    </div>
                    <div class="flex items-center gap-2" x-data="{ user: null }" x-init="user = await window.MarketplaceDB.getCurrentSession()">
                         <button @click="window.location.href='shop.html?filter=favorites'" 
                                 class="flex items-center gap-3 px-6 py-4 bg-primary/10 text-primary rounded-[24px] font-black text-[10px] uppercase tracking-widest hover:bg-primary hover:text-navy transition-all border border-primary/20">
                            <i data-lucide="heart" class="w-4 h-4"></i> Favorites
                         </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8" id="shop-grid">
                    <!-- Cards will be injected by app.js -->
                    <div class="animate-pulse bg-slate-50 dark:bg-slate-800/50 rounded-[40px] aspect-[4/5] min-h-[400px]"></div>
                    <div class="animate-pulse bg-slate-50 dark:bg-slate-800/50 rounded-[40px] aspect-[4/5] min-h-[400px]"></div>
                    <div class="animate-pulse bg-slate-50 dark:bg-slate-800/50 rounded-[40px] aspect-[4/5] min-h-[400px]"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-navy text-white pt-20 pb-8 mt-20">
        <div class="container mx-auto px-4 text-center space-y-4">
            <p class="text-xs text-slate-500 font-bold uppercase tracking-[0.3em]">MGCE | GIRLS SOCIETY</p>
            <p class="text-[10px] text-slate-600 font-bold uppercase tracking-widest">© 2026 Maseno Girl Child Empowerment Marketplace</p>
            <button onclick="window.goToAdmin()" class="opacity-30 hover:opacity-100 transition-opacity text-slate-400 hover:text-primary mt-4 block mx-auto">
                <i data-lucide="shield-check" class="w-5 h-5 mx-auto"></i>
            </button>
        </div>
    </footer>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        lucide.createIcons();
        const params = new URLSearchParams(window.location.search);
        if (params.get('type')) {
            document.querySelector('[x-data]').__x.$data.filter = params.get('type');
        }
    </script>
</body>
</html>
