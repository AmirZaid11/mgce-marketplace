<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Shop | Maseno Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#d4af37', // Gold
                        accent: '#6b21a8',  // Purple from Logo
                        navy: '#0f172a',
                        'navy-dark': '#020617',
                        cream: '#fdfcf7',
                        border: '#e2e8f0',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Firebase Global Elite -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="assets/js/firebase-config.js"></script>

    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-white dark:bg-navy text-navy selection:bg-primary/30" 
      x-data="{ mobileMenu: false, filter: 'all', user: null }"
      x-init="
        await window.MarketplaceDB.init();
        user = await window.MarketplaceDB.getCurrentSession();
      ">

    <!-- Navbar -->
    <header class="sticky top-0 z-50 w-full border-b border-border glass bg-white/80 dark:bg-navy/80">
        <div class="container mx-auto px-4 h-16 flex items-center justify-between gap-2">
            <a href="/" class="flex items-center gap-2 min-w-0">
                <img src="assets/images/mgce.jpeg" alt="MGCE Logo" class="h-8 md:h-12 w-auto shrink-0 logo-glow">
                <div class="flex flex-col leading-tight border-l border-slate-200 dark:border-slate-700 pl-2 overflow-hidden">
                    <span class="font-black text-navy dark:text-white text-sm md:text-lg tracking-tight uppercase truncate">MGCE</span>
                    <span class="text-[8px] text-accent font-bold uppercase tracking-tighter italic truncate">Marketplace</span>
                </div>
            </a>
            
            <nav class="flex items-center gap-1 md:gap-4 shrink-0">
                <a href="/shop" class="hidden lg:block text-sm font-bold text-primary uppercase tracking-widest">Shop</a>
                <template x-if="user && user.role === 'seller'">
                    <a href="/sell" class="hidden lg:block text-sm font-bold text-navy dark:text-slate-300 uppercase tracking-widest">Post</a>
                </template>
                
                <!-- Favorites Link -->
                <a href="/shop?filter=favorites" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-red-500 transition-colors" title="My Favorites">
                    <i data-lucide="heart" class="w-5 h-5"></i>
                </a>

                <!-- Theme Toggle -->
                <button onclick="toggleTheme()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition-all text-accent group" title="Switch Theme">
                    <i data-lucide="sun-moon" class="w-5 h-5 group-hover:rotate-12 transition-transform"></i>
                </button>

                <a href="/account" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full text-navy dark:text-slate-300"><i data-lucide="user" class="w-5 h-5"></i></a>
                <button x-show="user" @click="window.handleLogout()" class="p-2 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 rounded-full transition-colors" title="Log Out">
                    <i data-lucide="log-out" class="w-5 h-5"></i>
                </button>
                <button @click="mobileMenu = !mobileMenu" class="md:hidden p-2 text-navy dark:text-white"><i data-lucide="menu" class="w-5 h-5"></i></button>
            </nav>
        </div>

    </header>

    <!-- Mobile Menu Overlay (Moved to Body Root for compatibility) -->
    <div x-show="mobileMenu" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="opacity-0 -translate-x-full"
         x-transition:enter-end="opacity-100 translate-x-0"
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="opacity-100 translate-x-0"
         x-transition:leave-end="opacity-0 -translate-x-full"
         class="fixed inset-0 z-100 md:hidden" x-cloak>
        
        <div class="absolute inset-0 bg-navy/80 backdrop-blur-md" @click="mobileMenu = false"></div>
        
        <nav class="relative w-[280px] h-full bg-white dark:bg-slate-900 shadow-2xl flex flex-col overflow-y-auto border-r border-primary/20 text-navy dark:text-white">
            <!-- Menu Header -->
            <div class="p-6 border-b border-border dark:border-slate-800 flex items-center justify-between bg-white dark:bg-slate-900 sticky top-0 z-10">
                <div class="flex flex-col">
                    <span class="font-black uppercase tracking-tighter text-xl leading-none">MGCE</span>
                    <span class="text-[9px] text-primary font-black uppercase tracking-[0.2em]">Navigation</span>
                </div>
                <button @click="mobileMenu = false" class="p-2 bg-slate-100 dark:bg-slate-800 rounded-xl text-slate-500">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="p-6 flex-1 flex flex-col bg-white dark:bg-slate-900">
                <!-- Mobile Search -->
                <form onsubmit="window.handleNavbarSearch(event)" class="mb-8 relative">
                    <input type="text" placeholder="Search Maseno..." oninput="window.handleLiveSearch(event)"
                           class="w-full pl-10 pr-4 py-3 bg-slate-50 dark:bg-slate-800/50 border border-border dark:border-slate-800 rounded-2xl outline-none focus:ring-2 focus:ring-primary dark:text-white text-sm">
                    <i data-lucide="search" class="absolute left-3 top-3.5 w-4 h-4 text-slate-400"></i>
                </form>

                <div class="space-y-2 flex-1">
                    <a href="/" class="flex items-center gap-4 py-4 px-5 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800/50 font-bold uppercase tracking-widest text-xs transition-all">
                        <i data-lucide="home" class="w-4 h-4"></i> Home
                    </a>
                    <a href="/shop" class="flex items-center gap-4 py-4 px-5 rounded-2xl bg-primary/10 text-primary font-black uppercase tracking-widest text-xs transition-all border border-primary/20">
                        <i data-lucide="shopping-bag" class="w-4 h-4"></i> Shop All
                    </a>
                    <template x-if="user && user.role === 'seller'">
                        <a href="/sell" class="flex items-center gap-4 py-4 px-5 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800/50 font-bold uppercase tracking-widest text-xs transition-all">
                            <i data-lucide="plus-circle" class="w-4 h-4"></i> Post Item
                        </a>
                    </template>
                    <a href="/account" class="flex items-center gap-4 py-4 px-5 rounded-2xl hover:bg-slate-50 dark:hover:bg-slate-800/50 font-bold uppercase tracking-widest text-xs transition-all">
                        <i data-lucide="user" class="w-4 h-4"></i> My Account
                    </a>
                    <template x-if="user">
                        <button @click="window.handleLogout()" class="w-full flex items-center gap-4 py-4 px-5 rounded-2xl bg-red-500/10 text-red-500 font-black uppercase tracking-widest text-xs transition-all border border-red-500/20 mt-4">
                            <i data-lucide="log-out" class="w-4 h-4"></i> Log Out
                        </button>
                    </template>
                </div>

                <div class="mt-auto pt-8 border-t border-border dark:border-slate-800">
                    <p class="text-[8px] font-black text-slate-400 uppercase tracking-widest text-center">Empowering Maseno Community</p>
                </div>
            </div>
        </nav>
    </div>

    <main class="py-12 dark:bg-navy">
        <div class="container mx-auto px-4">
            <!-- Header & Filter -->
            <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center gap-8 mb-12">
                <div>
                    <h1 class="text-4xl font-black text-navy dark:text-white uppercase tracking-tight mb-2" id="category-title">Marketplace Feed</h1>
                    <p class="text-slate-500 dark:text-slate-400 text-sm">Everything for sale and hire within Maseno University.</p>
                </div>
                
                <div class="flex-1 w-full max-w-md relative group">
                    <input type="text" placeholder="Search products or services..." 
                           oninput="window.handleLiveSearch(event)"
                           class="w-full pl-12 pr-6 py-4 bg-slate-50 dark:bg-slate-800/50 border border-border dark:border-slate-800 rounded-2xl outline-none focus:ring-2 focus:ring-primary transition-all text-navy dark:text-white text-sm shadow-sm group-hover:border-primary/30">
                    <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-primary transition-colors"></i>
                </div>
                
                <div class="flex flex-wrap items-center gap-3" x-data="{ user: null }" x-init="user = await window.MarketplaceDB.getCurrentSession()">
                    <button @click="window.location.href='/shop'" 
                            :class="filter === 'all' ? 'bg-navy dark:bg-primary text-primary dark:text-navy border-navy dark:border-primary' : 'bg-slate-50 dark:bg-slate-800 text-slate-500 border-transparent hover:border-slate-200 dark:hover:border-slate-700'" 
                            class="px-6 py-2 rounded-full font-black text-[10px] uppercase tracking-widest transition-all shadow-sm border-2">All Feed</button>
                    
                    <button @click="window.location.href='/shop?type=product'" 
                            :class="filter === 'product' ? 'bg-navy dark:bg-primary text-primary dark:text-navy border-navy dark:border-primary' : 'bg-slate-50 dark:bg-slate-800 text-slate-500 border-transparent hover:border-slate-200 dark:hover:border-slate-700'" 
                            class="px-6 py-2 rounded-full font-black text-[10px] uppercase tracking-widest transition-all shadow-sm border-2 text-center flex items-center gap-2">
                        <i data-lucide="package" class="w-3 h-3"></i> Products
                    </button>
                    
                    <button @click="window.location.href='/shop?type=service'" 
                            :class="filter === 'service' ? 'bg-navy dark:bg-primary text-primary dark:text-navy border-navy dark:border-primary' : 'bg-slate-50 dark:bg-slate-800 text-slate-500 border-transparent hover:border-slate-200 dark:hover:border-slate-700'" 
                            class="px-6 py-2 rounded-full font-black text-[10px] uppercase tracking-widest transition-all shadow-sm border-2 text-center flex items-center gap-2">
                        <i data-lucide="sparkles" class="w-3 h-3"></i> Services
                    </button>

                    <template x-if="user">
                        <button @click="window.location.href='/shop?filter=favorites'" 
                                :class="filter === 'favorites' ? 'bg-primary text-navy border-primary' : 'bg-primary/10 text-primary border-primary/20 hover:bg-primary/20'" 
                                class="px-6 py-2 rounded-full font-black text-[10px] uppercase tracking-widest transition-all shadow-sm border-2 text-center flex items-center gap-2">
                            <i data-lucide="heart" class="w-3 h-3"></i> My Favorites
                        </button>
                    </template>
                </div>
            </div>

            <!-- Shop Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8" id="shop-grid">
                <!-- Shop items will be injected by app.js -->
                <div class="animate-pulse bg-white p-6 rounded-3xl border border-border aspect-square w-full"></div>
            </div>
        </div>
    </main>

    <footer class="bg-navy text-white pt-20 pb-8 mt-20">
        <div class="container mx-auto px-4 text-center space-y-4">
            <p class="text-xs text-slate-500 font-bold uppercase tracking-[0.3em]">MGCE | GIRLS SOCIETY</p>
            <p class="text-[10px] text-slate-600 font-bold uppercase tracking-widest">© 2026 Maseno Girl Child Empowerment Marketplace</p>
            <button onclick="window.goToAdmin()" class="opacity-30 hover:opacity-100 transition-opacity text-slate-400 hover:text-primary mt-4 block mx-auto">
                <i data-lucide="shield-check" class="w-5 h-5 mx-auto"></i>
            </button>
        </div>
    </footer>

    <script src="assets/js/storage.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        lucide.createIcons();
        const params = new URLSearchParams(window.location.search);
        if (params.get('type')) {
            document.querySelector('[x-data]').__x.$data.filter = params.get('type');
        }
    </script>
</body>
</html>
